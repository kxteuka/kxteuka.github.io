<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kateuka</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* Permite que el ratón pase a través del texto hacia el 3D */
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 0;
            font-weight: 200;
            opacity: 0.8;
        }

        p {
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #00ffcc;
            margin-top: 10px;
        }

        canvas {
            display: block;
        }
        .email-link {
            text-decoration: none; /* Quita el subrayado */
            color: inherit;       /* Mantiene el color blanco */
            pointer-events: auto;  /* ¡Importante! Permite que sea clicable */
            transition: opacity 0.3s ease;
        }

        .email-link:hover {
            opacity: 0.5; /* Efecto visual al pasar el ratón */
            cursor: pointer;
        }

        /* Ajuste extra para el contenedor */
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none; /* El contenedor no bloquea el 3D... */
        }

        #ui h1, #ui p {
            pointer-events: auto; /* ...pero el texto sí es interactivo */
        }
    </style>
</head>
<body>

    <div id="ui">
        <a href="mailto:ivan@kateuka.org" class="email-link">
        <h1>kateuka</h1>
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, sphere, particles;
    
    // Variables para el control de rotación por arrastre
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let targetRotationX = 0;
    let targetRotationY = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // La esfera (Icosaedro)
        const geometry = new THREE.IcosahedronGeometry(1, 1);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00ffcc, 
            wireframe: true,
            transparent: true,
            opacity: 0.5
        });
        sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Partículas de fondo
        const pGeometry = new THREE.BufferGeometry();
        const pCount = 500;
        const coords = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount * 3; i++) {
            coords[i] = (Math.random() - 0.5) * 10;
        }
        pGeometry.setAttribute('position', new THREE.BufferAttribute(coords, 3));
        const pMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.01 });
        particles = new THREE.Points(pGeometry, pMaterial);
        scene.add(particles);

        // EVENTOS DE RATÓN
        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaMove = {
                    x: e.offsetX - previousMousePosition.x,
                    y: e.offsetY - previousMousePosition.y
                };
                // Ajustamos la rotación según el movimiento
                sphere.rotation.y += deltaMove.x * 0.01;
                sphere.rotation.x += deltaMove.y * 0.01;
            }
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        });

        // EVENTOS TÁCTILES (Móvil)
        document.addEventListener('touchstart', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });

        document.addEventListener('touchend', () => isDragging = false);
        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaMove = {
                    x: e.touches[0].clientX - previousMousePosition.x,
                    y: e.touches[0].clientY - previousMousePosition.y
                };
                sphere.rotation.y += deltaMove.x * 0.01;
                sphere.rotation.x += deltaMove.y * 0.01;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        }, { passive: false });

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        // Si no estamos arrastrando, que siga rotando muy lentamente sola
        if (!isDragging) {
            sphere.rotation.y += 0.002;
            sphere.rotation.x += 0.001;
        }

        particles.rotation.y += 0.0005;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
