<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iván López</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #11182d;
      --glow1: rgba(124, 58, 237, 0.35);
      --glow2: rgba(6, 182, 212, 0.25);
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, var(--glow1), transparent 25%),
        radial-gradient(circle at 80% 80%, var(--glow2), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .card {
      width: 100%;
      max-width: 680px;
      padding: 56px 48px;
      border-radius: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 9vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .email {
      display: inline-block;
      margin-top: 24px;
      color: var(--muted);
      text-decoration: none;
      font-size: 1.05rem;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .email:hover {
      color: var(--text);
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      .card {
        padding: 40px 24px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Iván López</h1>
    <a class="email" href="mailto:ivan@kateuka.org">ivan@kateuka.org</a>
  </main>
</body>
</html>
