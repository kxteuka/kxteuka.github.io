<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kateuka | Welcome</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none; /* Permite que el ratón pase a través del texto hacia el 3D */
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 0;
            font-weight: 200;
            opacity: 0.8;
        }

        p {
            font-size: 0.9rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #00ffcc;
            margin-top: 10px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>KATEUKA</h1>
        <p>Interactive Experience</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, sphere, particles;
        let mouseX = 0, mouseY = 0;

        init();
        animate();

        function init() {
            // Escena y Cámara
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Objeto Principal: Una esfera de líneas (Icosaedro)
            const geometry = new THREE.IcosahedronGeometry(1, 1);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00ffcc, 
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // Añadir partículas flotantes
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 500;
            const coords = new Float32Array(pCount * 3);

            for (let i = 0; i < pCount * 3; i++) {
                coords[i] = (Math.random() - 0.5) * 10;
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(coords, 3));
            const pMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.01 });
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // Eventos
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
        }

        function onMouseMove(event) {
            // Normalizamos la posición del ratón de -1 a 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Rotación automática constante
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;

            // Interacción suave con el ratón (interpolación)
            sphere.rotation.x += (mouseY * 0.5 - sphere.rotation.x) * 0.05;
            sphere.rotation.y += (mouseX * 0.5 - sphere.rotation.y) * 0.05;

            particles.rotation.y += 0.001;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
